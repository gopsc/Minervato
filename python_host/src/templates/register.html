<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }} - 用户注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!--<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">-->
    <link href="{{ url_for('static', filename='css/font-awesome.min.css') }}" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af', // 企业主色调
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <!-- 品牌标志 -->
                <div class="flex items-center space-x-3">
                    <div class="bg-primary text-white p-2 rounded-lg">
                        <i class="fa fa-building text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold text-primary hidden md:block">{{ site_title }}</h1>
                </div>
                
                <!-- 登录链接 -->
                <div>
                    <a href="/login" class="text-primary hover:text-primary/80 font-medium">
                        已有账号？立即登录
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-900">用户注册</h2>
                <p class="text-gray-600 mt-2">创建您的账户以访问系统</p>
            </div>
            
            <!-- 注册表单 -->
            <form id="register-form" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="username" name="username" 
                            class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" 
                            placeholder="请输入用户名" required>
                    </div>
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" 
                            class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" 
                            placeholder="请输入密码" required>
                    </div>
                </div>
                
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="confirm-password" 
                            class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" 
                            placeholder="请再次输入密码" required>
                    </div>
                </div>
                
                <button type="submit" 
                    class="w-full bg-primary text-white py-2 px-4 rounded-md hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition duration-200">
                    注册
                </button>
            </form>
            
            <!-- 错误提示区域 -->
            <div id="error-message" class="mt-4 text-red-500 text-sm hidden"></div>
            
            <!-- 成功提示区域 -->
            <div id="success-message" class="mt-4 text-green-500 text-sm hidden"></div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white py-4 border-t border-gray-200">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            <p>© 2024 {{ site_title }}. 保留所有权利.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 重置消息
                errorMessage.classList.add('hidden');
                successMessage.classList.add('hidden');
                
                // 获取表单数据
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                // 验证密码是否一致
                if (password !== confirmPassword) {
                    errorMessage.textContent = '两次输入的密码不一致';
                    errorMessage.classList.remove('hidden');
                    return;
                }
                
                // 发送注册请求
                fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                })
                .then(response => {
                    // 先检查响应状态，再解析JSON
                    return response.json().then(data => ({
                        status: response.ok,
                        data: data
                    }));
                })
                .then(({ status, data }) => {
                    if (status) {
                        // 注册成功
                        successMessage.textContent = '注册成功！即将跳转到登录页面...';
                        successMessage.classList.remove('hidden');
                        
                        // 3秒后跳转到登录页面
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 3000);
                    } else {
                        // 注册失败
                        errorMessage.textContent = data.error || '注册失败，请稍后再试';
                        errorMessage.classList.remove('hidden');
                    }
                })
                .catch(error => {
                    console.error('注册请求错误:', error);
                    errorMessage.textContent = '网络错误，请稍后再试';
                    errorMessage.classList.remove('hidden');
                });
            });
        });
    </script>
</body>
</html>
